<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - KetikSitus</title>
    <style>
        :root { --bg:#fff; --text:#202124; --accent:#1a73e8; --border:#dadce0; }
        * { box-sizing:border-box; margin:0; padding:0; outline:none; font-family:'Verdana',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .container { width:100%; max-width:400px; padding:2rem; text-align:center; }
        .logo { font-size:2.5rem; font-weight:bold; color:var(--accent); font-style:italic; margin-bottom:2rem; }
        .form-group { margin-bottom:1.5rem; text-align:left; }
        label { display:block; font-size:0.8rem; color:#5f6368; margin-bottom:0.5rem; }
        input { width:100%; padding:12px; border:1px solid var(--border); border-radius:4px; font-size:1rem; transition:border 0.2s; }
        input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(26,115,232,0.2); }
        .btn { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:4px; font-size:1rem; font-weight:bold; cursor:pointer; }
        .btn:hover { opacity:0.9; }
        .error { color:#d93025; font-size:0.85rem; margin-top:1rem; display:none; animation:shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">KetikSitus</div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <button class="btn" onclick="handleLogin()">Masuk Dashboard</button>
        <div class="error" id="errorMsg">Username atau password salah!</div>
    </div>
    <script>
        if(localStorage.getItem('ks_auth')==='true') window.location.href='admin.html';
        function handleLogin(){
            const u=document.getElementById('username').value.trim();
            const p=document.getElementById('password').value.trim();
            if(u==='admin' && p==='admin'){
                localStorage.setItem('ks_auth','true');
                window.location.href='admin.html';
            } else {
                const e=document.getElementById('errorMsg');
                e.style.display='block';
                setTimeout(()=>e.style.display='none',3000);
            }
        }
        document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()});
    </script>
</body>
</html>
