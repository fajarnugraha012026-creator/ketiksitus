<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - KetikSitus</title>
    <!-- SortableJS untuk Drag & Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg:#f8f9fa; --card:#ffffff; --text:#202124; --accent:#1a73e8; --border:#dadce0; --danger:#d93025; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Verdana', sans-serif; min-height: 100vh; }
        
        header { background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); font-style: italic; }
        .logout-btn { background: transparent; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; color: #5f6368; }
        .logout-btn:hover { background: #f1f3f4; }

        main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        
        .tabs { display: flex; gap: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .tab-btn { padding: 10px 20px; background: transparent; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-weight: bold; color: #5f6368; font-family: inherit; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        
        .add-form { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media(max-width:600px) { .form-row { grid-template-columns: 1fr; } }
        
        label { display: block; font-size: 0.8rem; color: #5f6368; margin-bottom: 0.5rem; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        
        /* DRAG AND DROP LIST STYLES */
        .sortable-list { list-style: none; }
        .sortable-item { 
            background: white; border: 1px solid var(--border); border-radius: 8px; 
            padding: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 1rem;
            cursor: grab; transition: box-shadow 0.2s;
        }
        .sortable-item:active { cursor: grabbing; }
        .sortable-item.sortable-ghost { opacity: 0.4; background: #e8f0fe; border-color: var(--accent); }
        .drag-handle { color: #9aa0a6; font-size: 1.5rem; cursor: grab; padding-right: 1rem; }
        
        .item-info { flex: 1; }
        .item-title { font-weight: bold; margin-bottom: 4px; }
        .item-sub { font-size: 0.8rem; color: #5f6368; }
        
        .delete-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .delete-btn:hover { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">KetikSitus Admin</div>
        <button class="logout-btn" onclick="logout()">Keluar</button>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('semua')">Tab Semua</button>
            <button class="tab-btn" onclick="switchTab('berita')">Tab Berita</button>
            <button class="tab-btn" onclick="switchTab('gambar')">Tab Gambar</button>
        </div>

        <!-- TAB SEMUA -->
        <div id="tab-semua" class="tab-content active">
            <div class="add-form">
                <h3 style="margin-bottom:1rem;">Tambah Data "Semua"</h3>
                <div class="form-row">
                    <div><label>Judul</label><input type="text" id="s-title"></div>
                    <div><label>URL</label><input type="url" id="s-url"></div>
                </div>
                <div class="form-row">
                    <div><label>Deskripsi</label><textarea id="s-desc" rows="2"></textarea></div>
                    <div><label>Favicon URL</label><input type="text" id="s-fav" placeholder="https://..."></div>
                </div>
                <button class="btn-add" onclick="addItem('semua')">+ Tambah</button>
            </div>
            <ul id="list-semua" class="sortable-list"></ul>
        </div>

        <!-- TAB BERITA -->
        <div id="tab-berita" class="tab-content">
            <div class="add-form">
                <h3 style="margin-bottom:1rem;">Tambah Data "Berita"</h3>
                <div class="form-row">
                    <div><label>Kategori/Label</label><input type="text" id="b-cat"></div>
                    <div><label>Judul</label><input type="text" id="b-title"></div>
                </div>
                <div class="form-row">
                    <div><label>Deskripsi</label><textarea id="b-desc" rows="2"></textarea></div>
                    <div><label>Thumbnail URL</label><input type="text" id="b-thumb"></div>
                </div>
                <button class="btn-add" onclick="addItem('berita')">+ Tambah</button>
            </div>
            <ul id="list-berita" class="sortable-list"></ul>
        </div>

        <!-- TAB GAMBAR -->
        <div id="tab-gambar" class="tab-content">
            <div class="add-form">
                <h3 style="margin-bottom:1rem;">Tambah Data "Gambar"</h3>
                <div class="form-row">
                    <div><label>Judul Gambar</label><input type="text" id="g-title"></div>
                    <div><label>Sumber/URL Asal</label><input type="text" id="g-source"></div>
                </div>
                <div><label>URL Gambar</label><input type="text" id="g-img"></div>
                <button class="btn-add" onclick="addItem('gambar')">+ Tambah</button>
            </div>
            <ul id="list-gambar" class="sortable-list"></ul>
        </div>
    </main>

    <script>
        // AUTH CHECK
        if (localStorage.getItem('ks_admin_auth') !== 'true') window.location.href = 'login.html';

        const DB_KEY = 'ketiksitus_db_v2';
        let db = { semua: [], berita: [], gambar: [] };
        let sortables = {};

        // INIT
        window.onload = async function() {
            await loadDB();
            initSortable();
        };

        async function loadDB() {
            const stored = localStorage.getItem(DB_KEY);
            if (stored) {
                db = JSON.parse(stored);
            } else {
                try {
                    const res = await fetch('database.json');
                    if(res.ok) db = await res.json();
                } catch(e) {}
                saveDB();
            }
            renderAllLists();
        }

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        function logout() {
            localStorage.removeItem('ks_admin_auth');
            window.location.href = 'login.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // RENDER LISTS
        function renderAllLists() {
            renderList('semua', db.semua, item => `
                <div class="drag-handle">⋮⋮</div>
                <img src="${item.favicon || 'https://via.placeholder.com/32'}" style="width:32px;height:32px;border-radius:4px;">
                <div class="item-info">
                    <div class="item-title">${item.title}</div>
                    <div class="item-sub">${item.url}</div>
                </div>
                <button class="delete-btn" onclick="deleteItem('semua', ${item.id})">Hapus</button>
            `);

            renderList('berita', db.berita, item => `
                <div class="drag-handle">⋮</div>
                <img src="${item.thumb}" style="width:60px;height:60px;border-radius:4px;object-fit:cover;">
                <div class="item-info">
                    <div class="item-sub" style="color:var(--accent);font-weight:bold;">${item.category}</div>
                    <div class="item-title">${item.title}</div>
                </div>
                <button class="delete-btn" onclick="deleteItem('berita', ${item.id})">Hapus</button>
            `);

            renderList('gambar', db.gambar, item => `
                <div class="drag-handle">⋮⋮</div>
                <img src="${item.img}" style="width:80px;height:50px;border-radius:4px;object-fit:cover;">
                <div class="item-info">
                    <div class="item-title">${item.title}</div>
                    <div class="item-sub">${item.source}</div>
                </div>
                <button class="delete-btn" onclick="deleteItem('gambar', ${item.id})">Hapus</button>
            `);
        }

        function renderList(type, data, templateFn) {
            const list = document.getElementById(`list-${type}`);
            list.innerHTML = '';
            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'sortable-item';
                li.dataset.id = item.id;
                li.innerHTML = templateFn(item);
                list.appendChild(li);
            });
        }

        // SORTABLE JS INIT
        function initSortable() {
            ['semua', 'berita', 'gambar'].forEach(type => {
                sortables[type] = new Sortable(document.getElementById(`list-${type}`), {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    handle: '.drag-handle',
                    onEnd: function(evt) {
                        // Update DB order after drag
                        const items = Array.from(evt.to.children).map(el => {
                            const id = parseInt(el.dataset.id);
                            return db[type].find(i => i.id === id);
                        }).filter(Boolean);
                        db[type] = items;
                        saveDB();
                    }
                });
            });
        }

        // ADD ITEM
        function addItem(type) {
            const newItem = { id: Date.now() };
            
            if (type === 'semua') {
                newItem.title = document.getElementById('s-title').value;
                newItem.url = document.getElementById('s-url').value;
                newItem.desc = document.getElementById('s-desc').value;
                newItem.favicon = document.getElementById('s-fav').value || 'https://via.placeholder.com/32';
                if(!newItem.title || !newItem.url) return alert('Judul & URL wajib!');
            } else if (type === 'berita') {
                newItem.category = document.getElementById('b-cat').value;
                newItem.title = document.getElementById('b-title').value;
                newItem.desc = document.getElementById('b-desc').value;
                newItem.thumb = document.getElementById('b-thumb').value || 'https://via.placeholder.com/150';
                if(!newItem.title) return alert('Judul wajib!');
            } else if (type === 'gambar') {
                newItem.title = document.getElementById('g-title').value;
                newItem.source = document.getElementById('g-source').value;
                newItem.img = document.getElementById('g-img').value || 'https://via.placeholder.com/300x200';
                if(!newItem.title) return alert('Judul wajib!');
            }

            db[type].unshift(newItem);
            saveDB();
            renderAllLists();
            
            // Clear inputs
            document.querySelectorAll(`#tab-${type} input, #tab-${type} textarea`).forEach(i => i.value = '');
        }

        function deleteItem(type, id) {
            if(confirm('Hapus data ini?')) {
                db[type] = db[type].filter(i => i.id !== id);
                saveDB();
                renderAllLists();
            }
        }
    </script>
</body>
</html>
