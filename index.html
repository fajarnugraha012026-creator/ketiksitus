<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetikSitus - Pencarian Cepat</title>
    <style>
        :root { 
            --bg:#fff; --text:#202124; --muted:#5f6368; --accent:#1a73e8; 
            --border:#dadce0; --shadow:0 1px 6px rgba(32,33,36,.1); 
            --transition:all .3s cubic-bezier(.4,0,.2,1); 
        }
        * { box-sizing:border-box; margin:0; padding:0; outline:none; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:'Verdana',sans-serif; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
        
        /* THEME TOGGLE */
        .theme-toggle { position:fixed; top:20px; right:20px; width:40px; height:40px; border-radius:50%; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1000; transition:var(--transition); color:var(--muted); }
        .theme-toggle:hover { background:rgba(0,0,0,.05); color:var(--text); }
        .theme-toggle svg { width:24px; height:24px; fill:currentColor; }

        /* HOME VIEW */
        #home-view { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; opacity:1; transform:scale(1); transition:opacity .4s ease, transform .4s ease; }
        #home-view.hidden { opacity:0; transform:scale(.95); pointer-events:none; position:absolute; width:100%; }
        .logo-big { font-size:5rem; font-weight:bold; color:var(--accent); font-style:italic; margin-bottom:3rem; letter-spacing:-3px; user-select:none; text-shadow:0 2px 10px rgba(26,115,232,.1); }
        
        .search-container-home { width:100%; max-width:580px; position:relative; margin-bottom:2rem; }
        .search-input-home { width:100%; padding:18px 55px; border-radius:30px; border:1px solid var(--border); font-size:1.1rem; box-shadow:var(--shadow); transition:var(--transition); background:white; }
        .search-input-home:focus { box-shadow:0 4px 12px rgba(32,33,36,.15); border-color:var(--accent); }
        .icon-search { position:absolute; left:20px; top:50%; transform:translateY(-50%); color:#9aa0a6; width:20px; height:20px; pointer-events:none; }
        .btn-clear { position:absolute; right:20px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--muted); opacity:0; transition:opacity .2s; font-size:1.2rem; line-height:1; }
        .btn-clear.visible { opacity:1; }
        
        .home-buttons { display:flex; gap:1rem; }
        .btn-pill { padding:10px 20px; background:#f8f9fa; border:1px solid #f8f9fa; border-radius:4px; color:#3c4043; font-size:.9rem; cursor:pointer; transition:var(--transition); }
        .btn-pill:hover { border-color:#dadce0; box-shadow:0 1px 3px rgba(0,0,0,.1); color:var(--text); }

        /* RESULTS VIEW */
        #results-view { display:none; flex-direction:column; min-height:100vh; opacity:0; transform:translateY(20px); transition:opacity .4s ease, transform .4s ease; }
        #results-view.visible { opacity:1; transform:translateY(0); display:flex; }
        
        .res-header { padding:1.5rem 2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:2rem; position:sticky; top:0; background:rgba(255,255,255,.95); backdrop-filter:blur(10px); z-index:100; }
        .logo-small { font-size:1.8rem; font-weight:bold; color:var(--accent); font-style:italic; cursor:pointer; user-select:none; transition:transform .2s; }
        .logo-small:hover { transform:scale(1.05); }
        .res-search-box { flex:1; max-width:600px; position:relative; }
        .res-input { width:100%; padding:12px 45px 12px 20px; border-radius:24px; border:1px solid var(--border); background:#f1f3f4; font-size:1rem; transition:var(--transition); }
        .res-input:focus { background:white; box-shadow:var(--shadow); border-color:transparent; }

        .tabs-nav { display:flex; gap:2rem; padding:0 2rem; border-bottom:1px solid var(--border); margin-top:.5rem; overflow-x:auto; scrollbar-width:none; }
        .tabs-nav::-webkit-scrollbar { display:none; }
        .tab-link { padding:12px 0; border-bottom:3px solid transparent; cursor:pointer; color:var(--muted); font-size:.9rem; display:flex; align-items:center; gap:8px; transition:var(--transition); white-space:nowrap; }
        .tab-link:hover { color:var(--text); }
        .tab-link.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:bold; }
        .tab-link svg { width:18px; height:18px; fill:currentColor; }

        main { flex:1; max-width:850px; margin:0 auto; padding:2rem 2rem 4rem; width:100%; }
        .stats { color:#70757a; font-size:.85rem; margin-bottom:2rem; opacity:0; animation:fadeIn .5s forwards .2s; }
        
        @keyframes slideUpFade { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        /* RESULT CARDS */
        .result-item { margin-bottom:2.5rem; opacity:0; animation:slideUpFade .5s ease forwards; }
        .r-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .r-fav { width:28px; height:28px; border-radius:50%; background:#f1f3f4; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:bold; color:var(--accent); border:1px solid var(--border); }
        .r-site-info { display:flex; flex-direction:column; }
        .r-site { font-size:.9rem; color:var(--text); font-weight:500; }
        .r-url { font-size:.8rem; color:var(--muted); word-break:break-all; }
        .r-title { color:var(--accent); font-size:1.4rem; text-decoration:none; display:block; margin:6px 0 8px; font-weight:normal; line-height:1.3; transition:color .2s; }
        .r-title:hover { text-decoration:underline; color:#1557b0; }
        .r-desc { color:#4d5156; font-size:.95rem; line-height:1.6; }

        .news-card { display:flex; gap:2rem; margin-bottom:2rem; padding-bottom:2rem; border-bottom:1px solid #ebebeb; opacity:0; animation:slideUpFade .5s ease forwards; transition:transform .2s; }
        .news-card:hover { transform:translateX(5px); }
        .n-content { flex:1; }
        .n-label { font-size:.75rem; color:var(--muted); display:flex; align-items:center; gap:6px; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
        .n-label svg { width:14px; height:14px; fill:currentColor; }
        .n-title { font-size:1.3rem; color:var(--text); text-decoration:none; display:block; margin-bottom:8px; font-weight:500; line-height:1.4; }
        .n-title:hover { text-decoration:underline; color:var(--accent); }
        .n-desc { color:#4d5156; font-size:.95rem; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .n-thumb { width:140px; height:90px; border-radius:12px; object-fit:cover; background:#f1f3f4; flex-shrink:0; transition:transform .3s; }
        .news-card:hover .n-thumb { transform:scale(1.05); }

        .img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:2rem; }
        .img-card { break-inside:avoid; margin-bottom:1rem; opacity:0; animation:slideUpFade .5s ease forwards; }
        .img-wrap { border-radius:12px; overflow:hidden; margin-bottom:10px; border:1px solid var(--border); box-shadow:var(--shadow); transition:var(--transition); }
        .img-wrap:hover { box-shadow:0 4px 12px rgba(32,33,36,.15); transform:translateY(-5px); }
        .img-wrap img { width:100%; display:block; transition:transform .5s; }
        .img-wrap:hover img { transform:scale(1.05); }
        .img-title { font-size:.95rem; color:var(--text); margin-bottom:4px; font-weight:500; }
        .img-src { font-size:.8rem; color:var(--muted); }

        footer { text-align:center; padding:3rem 2rem; color:var(--muted); font-size:.85rem; border-top:1px solid var(--border); margin-top:auto; background:#f8f9fa; }
        .pagination { display:flex; justify-content:center; align-items:center; gap:1.5rem; margin:4rem 0 2rem; }
        .pag-logo { font-size:1.4rem; font-weight:bold; color:var(--accent); font-style:italic; }
        .pag-next { color:var(--accent); text-decoration:none; font-weight:bold; padding:8px 16px; border-radius:20px; transition:background .2s; }
        .pag-next:hover { background:rgba(26,115,232,.1); }

        /* DARK MODE */
        body.dark { --bg:#202124; --text:#e8eaed; --muted:#9aa0a6; --border:#3c4043; --accent:#8ab4f8; --shadow:0 1px 6px rgba(0,0,0,.3); }
        body.dark .search-input-home, body.dark .res-input { background:#303134; border-color:#5f6368; color:white; }
        body.dark .btn-pill { background:#303134; color:#e8eaed; border-color:#303134; }
        body.dark .res-header, body.dark footer { background:#202124; }
        body.dark .r-fav { background:#303134; border-color:#5f6368; }
        body.dark .n-thumb, body.dark .img-wrap { border-color:#3c4043; background:#303134; }
        body.dark .news-card { border-bottom-color:#3c4043; }
        mark { background:#fef7cd; color:black; padding:0 2px; border-radius:2px; font-weight:500; }
        body.dark mark { background:#3c4043; color:white; }

        @media(max-width:768px) {
            .logo-big { font-size:3rem; margin-bottom:2rem; }
            .res-header { flex-direction:column; align-items:stretch; gap:1rem; padding:1rem; }
            .res-search-box { max-width:100%; }
            .tabs-nav { padding:0 1rem; gap:1.5rem; }
            .news-card { flex-direction:column; gap:1rem; }
            .n-thumb { width:100%; height:180px; }
            .img-grid { grid-template-columns:repeat(2,1fr); gap:1rem; }
            main { padding:1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
        <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>

    <!-- HOME VIEW -->
    <div id="home-view">
        <div class="logo-big">KetikSitus</div>
        <div class="search-container-home">
            <svg class="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" class="search-input-home" id="homeInput" placeholder="Cari di web..." autocomplete="off">
            <span class="btn-clear" id="homeClear" onclick="clearHome()">✕</span>
        </div>
        <div class="home-buttons">
            <button class="btn-pill" onclick="executeSearch()">Temukan</button>
            <button class="btn-pill" onclick="quickSearch()">Cari Cepat</button>
        </div>
    </div>

    <!-- RESULTS VIEW -->
    <div id="results-view">
        <div class="res-header">
            <div class="logo-small" onclick="goHome()">KetikSitus</div>
            <div class="res-search-box">
                <input type="text" class="res-input" id="resInput" placeholder="Cari lagi..." autocomplete="off">
                <span class="btn-clear visible" style="right:15px;" onclick="clearRes()"></span>
            </div>
        </div>
        
        <div class="tabs-nav">
            <div class="tab-link active" onclick="switchTab('semua', this)">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                Semua
            </div>
            <div class="tab-link" onclick="switchTab('gambar', this)">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                Gambar
            </div>
            <div class="tab-link" onclick="switchTab('berita', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                Berita
            </div>
        </div>

        <main>
            <div class="stats" id="statsText"></div>
            <div id="resultsContainer"></div>
            <div class="pagination">
                <div class="pag-logo">KetikSitus</div>
                <div style="font-weight:bold;">1</div>
                <a href="#" class="pag-next" onclick="event.preventDefault()">Next ></a>
            </div>
        </main>

        <footer>© 2026 KetikSitus &nbsp;&bull;&nbsp; Kebijakan Privasi &nbsp;&bull;&nbsp; Syarat & Ketentuan</footer>
    </div>

    <script>
        // === STATE MANAGEMENT STRICT ===
        const DB_KEY = 'ketiksitus_db_v3';
        let db = { semua: [], berita: [], gambar: [] };
        let currentTab = 'semua';
        let currentQuery = ''; // SINGLE SOURCE OF TRUTH FOR QUERY
        
        // DOM Elements Cache
        const els = {
            homeView: document.getElementById('home-view'),
            resultsView: document.getElementById('results-view'),
            homeInput: document.getElementById('homeInput'),
            resInput: document.getElementById('resInput'),
            homeClear: document.getElementById('homeClear'),
            stats: document.getElementById('statsText'),
            container: document.getElementById('resultsContainer')
        };

        // === INITIALIZATION ===
        window.onload = async function() {
            await loadDB();
            setupEventListeners();
            checkUrlParams();
            loadTheme();
        };

        async function loadDB() {
            const stored = localStorage.getItem(DB_KEY);
            if (stored) {
                db = JSON.parse(stored);
            } else {
                try {
                    const res = await fetch('database.json');
                    if (res.ok) db = await res.json();
                } catch (e) { console.warn('DB Load Failed:', e); }
            }
        }

        function setupEventListeners() {
            // Home Input
            els.homeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    executeSearch();
                }
            });
            
            els.homeInput.addEventListener('input', () => {
                els.homeClear.classList.toggle('visible', els.homeInput.value.length > 0);
            });

            // Results Input
            els.resInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    executeSearch();
                }
            });

            // Handle Browser Back/Forward
            window.addEventListener('popstate', (e) => {
                const q = new URLSearchParams(window.location.search).get('q');
                if (q) {
                    syncInputs(q);
                    showResultsView(q);
                } else {
                    showHomeView();
                }
            });
        }

        function checkUrlParams() {
            const q = new URLSearchParams(window.location.search).get('q');
            if (q) {
                syncInputs(q);
                showResultsView(q);
            }
        }

        // === CORE SEARCH LOGIC (BUG-FREE) ===
        function executeSearch() {
            // 1. Get value from whichever input is active/filled
            let rawQ = els.homeInput.value.trim() || els.resInput.value.trim();
            
            // 2. VALIDATION & SANITIZATION
            if (!rawQ) return;
            
            // 3. SYNC ALL INPUTS IMMEDIATELY (Prevent ghost values)
            syncInputs(rawQ);
            
            // 4. UPDATE URL WITHOUT RELOAD
            const newUrl = `${window.location.pathname}?q=${encodeURIComponent(rawQ)}`;
            window.history.pushState({ q: rawQ }, '', newUrl);
            
            // 5. EXECUTE RENDER
            showResultsView(rawQ);
        }

        function syncInputs(query) {
            els.homeInput.value = query;
            els.resInput.value = query;
            els.homeClear.classList.toggle('visible', query.length > 0);
        }

        function showResultsView(query) {
            currentQuery = query.toLowerCase().trim();
            
            // Smooth Transition
            els.homeView.classList.add('hidden');
            els.resultsView.style.display = 'flex';
            
            // Force reflow for animation
            void els.resultsView.offsetWidth; 
            els.resultsView.classList.add('visible');
            
            renderCurrentTab();
        }

        function showHomeView() {
            els.resultsView.classList.remove('visible');
            
            setTimeout(() => {
                els.resultsView.style.display = 'none';
                els.homeView.classList.remove('hidden');
                
                // Clear inputs when going home
                els.homeInput.value = '';
                els.resInput.value = '';
                els.homeClear.classList.remove('visible');
                currentQuery = '';
            }, 400);
        }

        function goHome() {
            window.history.pushState({}, '', window.location.pathname);
            showHomeView();
        }

        function clearHome() {
            els.homeInput.value = '';
            els.homeInput.focus();
            els.homeClear.classList.remove('visible');
        }

        function clearRes() {
            goHome(); // Clearing in results view goes back home
        }

        function quickSearch() {
            const q = prompt("Masukkan kata kunci:");
            if (q && q.trim()) {
                syncInputs(q.trim());
                executeSearch();
            }
        }

        // === TAB & RENDER LOGIC ===
        function switchTab(tab, element) {
            currentTab = tab;
            
            // Update UI
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            if (element) element.classList.add('active');
            
            // Re-render with animation reset
            els.container.innerHTML = '';
            requestAnimationFrame(() => renderCurrentTab());
        }

        function renderCurrentTab() {
            let data = [];
            const fieldsMap = {
                'semua': ['title', 'desc', 'url'],
                'berita': ['title', 'desc', 'category'],
                'gambar': ['title', 'source']
            };
            
            data = filterData(db[currentTab] || [], fieldsMap[currentTab]);
            
            // Update Stats
            els.stats.textContent = `About ${data.length} results (${(Math.random() * 0.3 + 0.1).toFixed(2)} seconds)`;
            els.stats.style.animation = 'none';
            void els.stats.offsetWidth; // Trigger reflow
            els.stats.style.animation = 'fadeIn .5s forwards .2s';

            // Empty State
            if (data.length === 0) {
                els.container.innerHTML = `<div style="text-align:center;padding:4rem;color:#70757a;animation:fadeIn .5s;">Tidak ada hasil untuk "<b>${escapeHtml(currentQuery)}</b>"</div>`;
                return;
            }

            // Render Based on Tab
            if (currentTab === 'semua') renderSemua(data);
            else if (currentTab === 'berita') renderBerita(data);
            else if (currentTab === 'gambar') renderGambar(data);
        }

        function filterData(arr, fields) {
            if (!currentQuery) return arr;
            return arr.filter(item => 
                fields.some(f => (item[f] || '').toLowerCase().includes(currentQuery))
            );
        }

        // === RENDERERS ===
        function renderSemua(data) {
            const frag = document.createDocumentFragment();
            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.style.animationDelay = `${i * 0.05}s`;
                div.innerHTML = `
                    <div class="r-meta">
                        <div class="r-fav">${item.title.charAt(0).toUpperCase()}</div>
                        <div class="r-site-info">
                            <div class="r-site">${highlight(item.title.split(' ')[0])}</div>
                            <div class="r-url">${highlight(item.url)}</div>
                        </div>
                    </div>
                    <a href="${item.url}" target="_blank" rel="noopener" class="r-title">${highlight(item.title)}</a>
                    <div class="r-desc">${highlight(item.desc)}</div>
                `;
                frag.appendChild(div);
            });
            els.container.appendChild(frag);
        }

        function renderBerita(data) {
            const frag = document.createDocumentFragment();
            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'news-card';
                div.style.animationDelay = `${i * 0.05}s`;
                div.innerHTML = `
                    <div class="n-content">
                        <div class="n-label">
                            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                            ${highlight(item.category)}
                        </div>
                        <a href="#" class="n-title">${highlight(item.title)}</a>
                        <div class="n-desc">${highlight(item.desc)}</div>
                    </div>
                    <img src="${item.thumb}" class="n-thumb" loading="lazy" onerror="this.src='https://via.placeholder.com/140x90'">
                `;
                frag.appendChild(div);
            });
            els.container.appendChild(frag);
        }

        function renderGambar(data) {
            const grid = document.createElement('div');
            grid.className = 'img-grid';
            
            const frag = document.createDocumentFragment();
            data.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'img-card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = `
                    <div class="img-wrap">
                        <img src="${item.img}" loading="lazy" alt="${escapeHtml(item.title)}">
                    </div>
                    <div class="img-title">${highlight(item.title)}</div>
                    <div class="img-src">${highlight(item.source)}</div>
                `;
                frag.appendChild(card);
            });
            grid.appendChild(frag);
            els.container.appendChild(grid);
        }

        // === UTILITIES ===
        function highlight(text) {
            if (!currentQuery || !text) return text || '';
            const safe = currentQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('ks_theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        function loadTheme() {
            if (localStorage.getItem('ks_theme') === 'dark') {
                document.body.classList.add('dark');
                updateThemeIcon(true);
            }
        }

        function updateThemeIcon(isDark) {
            const btn = document.querySelector('.theme-toggle svg');
            if (isDark) {
